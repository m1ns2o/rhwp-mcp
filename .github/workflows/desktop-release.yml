name: rhwp-mcp Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            rhwp-studio/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnss3 libxss1 libatk-bridge2.0-0 libdrm2 libgbm1
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

      - name: Build studio
        working-directory: rhwp-studio
        run: |
          npm ci
          npm run build

      - name: Build MCP sidecar
        run: cargo build --profile desktop-release --bin rhwp-mcp

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop artifacts
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rhwp-mcp-desktop-${{ runner.os }}
          path: |
            desktop/release/**
            !desktop/release/*-unpacked/**

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/**
            !desktop/release/*-unpacked/**
